services:
  postgres:
    image: postgres:16-alpine
    container_name: flowpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowpilot
    ports:
      - "5432:5432"
    volumes:
      - flowpilot_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flowpilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  flowpilot_postgres:
